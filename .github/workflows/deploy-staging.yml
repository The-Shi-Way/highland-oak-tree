name: Deploy Staging

on:
  push:
    branches: [develop]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  SERVER_REPO: highland-oak-tree/server
  CLIENT_REPO: highland-oak-tree/client
  ECS_CLUSTER: highland-oak-staging

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push server image
        run: |
          docker build -t $ECR_REGISTRY/$SERVER_REPO:${{ github.sha }} server-nestjs/
          docker push $ECR_REGISTRY/$SERVER_REPO:${{ github.sha }}

      - name: Build and push client image
        run: |
          docker build -t $ECR_REGISTRY/$CLIENT_REPO:${{ github.sha }} client/
          docker push $ECR_REGISTRY/$CLIENT_REPO:${{ github.sha }}

      - name: Update ECS server service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service highland-oak-server \
            --force-new-deployment

      - name: Update ECS client service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service highland-oak-client \
            --force-new-deployment
