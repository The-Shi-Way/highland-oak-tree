name: Deploy Production

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  SERVER_REPO: highland-oak-tree/server
  CLIENT_REPO: highland-oak-tree/client
  ECS_CLUSTER: highland-oak-production

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Manual approval gate
        run: echo "Deployment approved"

  deploy:
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve -var-file=environments/production.tfvars

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push server image
        run: |
          docker build -f server-nestjs/Dockerfile \
                        -t $ECR_REGISTRY/$SERVER_REPO:${{ github.sha }} \
                        -t $ECR_REGISTRY/$SERVER_REPO:latest \
                        .
          docker push $ECR_REGISTRY/$SERVER_REPO --all-tags

      - name: Build and push client image
        run: |
          docker build -f client/Dockerfile \
                        -t $ECR_REGISTRY/$CLIENT_REPO:${{ github.sha }} \
                        -t $ECR_REGISTRY/$CLIENT_REPO:latest \
                        .
          docker push $ECR_REGISTRY/$CLIENT_REPO --all-tags

      - name: Update ECS server service (rolling)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service highland-oak-server \
            --force-new-deployment \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100"

      - name: Update ECS client service (rolling)
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service highland-oak-client \
            --force-new-deployment \
            --deployment-configuration "maximumPercent=200,minimumHealthyPercent=100"

      - name: Wait for server stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services highland-oak-server

      - name: Wait for client stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services highland-oak-client
